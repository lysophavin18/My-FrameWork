# ============================================================
# Expl0V1N Framework — Docker Compose Production Override
# ============================================================
# Uses pre-built images from GitHub Container Registry (GHCR)
# instead of building from source.
#
# Usage:
#   # Set your GHCR image owner (GitHub username or org, lowercase):
#   export IMAGE_OWNER=lysophavin18
#   export IMAGE_TAG=latest       # or a specific commit SHA
#
#   # Pull pre-built images and start core services:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     --profile core pull
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     --profile core up -d --no-build
#
#   # Start all profiles:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     --profile core --profile hunting --profile advanced --profile ai pull
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     --profile core --profile hunting --profile advanced --profile ai up -d --no-build
# ============================================================

services:
