# ============================================================
# Deploy — Build, Push & Release
# ============================================================
# Triggered on pushes to main (after CI passes) or manually.
# Builds Docker images for every service and pushes them to
# GitHub Container Registry (ghcr.io).
# ============================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ── Build & push core service images ───────────────────────
  push-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: frontend,             context: ./frontend }
          - { name: backend,              context: ./backend }
          - { name: orchestrator,         context: ./orchestrator }
          - { name: notification-service, context: ./notification-service }
          - { name: ai-assistant,         context: ./ai-assistant }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/expl0v1n-${{ matrix.service.name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & push VAPT tool images ─────────────────────────
  push-tools:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool:
          - nmap
          - nuclei
          - nikto
          - sqlmap
          - subfinder
          - amass
          - httpx
          - katana
          - gowitness
          - assetfinder
          - massdns
          - masscan
          - ffuf
          - feroxbuster
          - kiterunner
          - arjun
          - trufflehog
          - linkfinder
          - subjack
          - cloud-enum
          - interactsh
          - theharvester
          - asnmap
          - puredns
          - altdns-dnsgen
          - jsluice
          - metasploit
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/expl0v1n-tool-${{ matrix.tool }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push ${{ matrix.tool }}
        uses: docker/build-push-action@v6
        with:
          context: ./tools/${{ matrix.tool }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
